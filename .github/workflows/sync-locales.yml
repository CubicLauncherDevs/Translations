name: Sync locales

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync missing keys from en-US to other locales
        run: node tools/sync-locales.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'sync: add missing locale keys from en-US'
          title: 'Sync new locale keys from en-US'
          body: |
            Se agregaron automáticamente claves faltantes desde `en-US.json` a los demás archivos de locale.

            Las traducciones existentes **no fueron modificadas**.
          branch: sync-locales
          delete-branch: true
